name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar credentials.json vazio
        run: echo '{}' > credentials.json

      - name: Rodar testes com cobertura
        run: pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Resumo de cobertura
        if: always()
        run: |
          echo "## Resultado dos testes" >> $GITHUB_STEP_SUMMARY
          pytest tests/ --cov=app --cov-report=term-missing \
            --tb=no -q 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy no Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
